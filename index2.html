<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Foto</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 120px 20px 40px; /* Ditambah padding-top agar tidak tertutup navbar */
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        /* Sisi Kiri Navbar (Logo + Tombol Kembali) */
        .nav-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-text {
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            white-space: nowrap;
        }

        /* TOMBOL KEMBALI KE BERANDA DI KIRI ATAS */
        .btn-back-home {
            background: linear-gradient(135deg, #ce9ffc 0%, #7367f0 100%);
            color: white;
            text-decoration: none;
            font-weight: 700;
            padding: 0.4rem 1.2rem;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(115, 103, 240, 0.4);
            transition: all 0.3s ease;
            font-size: 0.9rem;
            border: 2px solid transparent;
            white-space: nowrap;
        }

        .btn-back-home:hover {
            background: transparent;
            color: #ce9ffc;
            border-color: #ce9ffc;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(206, 159, 252, 0.3);
        }

        /* Menu Navigasi Sisi Kanan */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: #ce9ffc;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .album-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .album-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .album-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* Desain Tambahan untuk Pop-up Gambar */
        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
        
        .modal-body img {
            border-radius: 12px;
            max-height: 80vh;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            body { padding-top: 100px; padding-left: 15px; padding-right: 15px; }
            .album-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
            h1 { font-size: 2em; }
        }

        @media (max-width: 480px) {
            .album-image { height: 180px; }
        }
    </style>
</head>
<body>

    <!-- Header / Navbar Atas -->
    <nav>
        <div class="nav-container">
            <!-- Sisi Kiri: Ucapan Selamat Datang & Tombol Kembali ke Beranda -->
            <div class="nav-left">
                <div class="logo-text">Welcome Satria :)</div>
                <a href="p.html" class="btn-back-home">🏠 Kembali ke Beranda</a>
            </div>
            
            <!-- Sisi Kanan: Menu Navigasi Halaman Lain -->
            <ul class="nav-links">
                <li><a href="p.html">Beranda</a></li>
                <li><a href="index5.html">Tentang Saya</a></li>
                <li><a href="#">Album</a></li>
                <li><a href="index3.html">Projek</a></li>
            </ul>
        </div>
    </nav>

    <!-- Konten Utama Album -->
    <div class="container">
        <h1>Album Foto</h1>
        
        <div class="album-grid">
            <!-- Menambahkan attribute data-bs-toggle & data-bs-target agar memicu modal Bootstrap -->
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="j.jpg" class="album-image" alt="Foto Satria">
            </div>
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="DESI OKTA.jpg" class="album-image" alt="Foto Desi Okta">
            </div>
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="18078.jpg" class="album-image" alt="Foto 18078">
            </div>
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="WhatsApp Image 2025-07-27 at 20.08.21_9154ebfa.jpg" class="album-image" alt="Foto WhatsApp">
            </div>
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="IMG20250816123804.jpg" class="album-image" alt="Foto Kegiatan 1">
            </div>
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="IMG20250816123706.jpg" class="album-image" alt="Foto Kegiatan 2">
            </div>
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="gunung.jpg" class="album-image" alt="Foto Gunung">
            </div>
            <div class="album-item" data-bs-toggle="modal" data-bs-target="#imageModal">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" class="album-image" alt="Foto Pemandangan">
            </div>
        </div>
    </div>

    <!-- STRUKTUR POP-UP (MODAL BOOTSTRAP) -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center p-0 pb-4">
                    <!-- Gambar di dalam pop-up ini akan berganti otomatis lewat JavaScript -->
                    <img src="" id="modalImage" class="img-fluid" alt="Preview">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle dengan Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <!-- JAVASCRIPT: Mengatur agar gambar yang diklik masuk ke dalam Pop-up -->
    <script>
        const imageModal = document.getElementById('imageModal');
        if (imageModal) {
            imageModal.addEventListener('show.bs.modal', function (event) {
                // Mengambil elemen item album yang diklik
                const clickedItem = event.relatedTarget;
                // Mengambil sumber gambar (src) dari item yang diklik
                const imageSrc = clickedItem.querySelector('.album-image').getAttribute('src');
                const imageAlt = clickedItem.querySelector('.album-image').getAttribute('alt');
                
                // Memasukkan sumber gambar ke dalam tag img yang ada di pop-up modal
                const modalImage = document.getElementById('modalImage');
                modalImage.src = imageSrc;
                modalImage.alt = imageAlt;
            });
        }
    </script>
</body>
</html>
